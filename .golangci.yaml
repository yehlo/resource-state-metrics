version: "2"
linters:
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - canonicalheader
    - containedctx
    - contextcheck
    - copyloopvar
    - cyclop
    - decorder
    - depguard
    - dogsled
    - dupl
    - dupword
    - durationcheck
    - errchkjson
    - errname
    - errorlint
    - exhaustive
    - exptostd
    - fatcontext
    - forbidigo
    - forcetypeassert
    - funcorder
    - funlen
    - ginkgolinter
    - gocheckcompilerdirectives
    - gochecknoinits
    - gochecksumtype
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godot
    - godox
    - goheader
    - gomoddirectives
    - gomodguard
    - goprintffuncname
    - gosec
    - gosmopolitan
    - grouper
    - iface
    - importas
    - inamedparam
    - interfacebloat
    - intrange
    - lll
    - loggercheck
    - maintidx
    - makezero
    - mirror
    - misspell
    - mnd
    - musttag
    - nakedret
    - nestif
    - nilerr
    - nilnesserr
    - nilnil
    - nlreturn
    - noctx
    - nolintlint
    - nonamedreturns
    - nosprintfhostport
    - paralleltest
    - perfsprint
    - prealloc
    - predeclared
    - promlinter
    - protogetter
    - reassign
    - recvcheck
    - revive
    - rowserrcheck
    - sloglint
    - spancheck
    - sqlclosecheck
    - staticcheck
    - tagalign
    - tagliatelle
    - testableexamples
    - testifylint
    - thelper
    - tparallel
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - usetesting
    - varnamelen
    - wastedassign
    - whitespace
    - wsl_v5
    - zerologlint
  disable:
    - err113
    - exhaustruct
    - gochecknoglobals
    - ireturn
    - testpackage
    - wrapcheck
  settings:
    cyclop:
      max-complexity: 12
    depguard:
      rules:
        main:
          deny:
            - pkg: github.com/pkg/errors
              desc: Use 'errors' or 'fmt' instead.
            - pkg: golang.org/x/exp/slices
              desc: Use 'slices' instead.
    funlen:
      lines: 65
      statements: 50
    lll:
      line-length: 200
    forbidigo:
      forbid:
        - pattern: '^(klog|logger)\.(Info|InfoS)$'
          msg: "use .V(n).Info() to attach a verbosity level; bare .Info() always logs regardless of -v"
        - pattern: '^regexp\.(MustCompile|Compile)$'
          msg: "compile regexes at package level (var foo = regexp.MustCompile(...)) to avoid repeated compilation in hot paths"
    mnd:
      # 0.9, 1e9: unit conversion constants.
      # 2, 4, 10: klog V-level verbosity tiers (ignored-functions doesn't
      # work for method chain arguments like logger.V(2).Info(...) in go-mnd v2).
      ignored-numbers:
        - '0.9'
        - '1e9'
        - '2'
        - '4'
        - '10'
      ignored-functions:
        - 'flag\..*'
        - 'rate\.NewLimiter'
        - 'make'
    perfsprint:
      strconcat: false
    varnamelen:
      max-distance: 20
      check-receiver: false
      ignore-type-assert-ok: true
      ignore-map-index-ok: true
      ignore-chan-recv-ok: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - dupl
          - funlen
          - ireturn
          - lll
          - mnd
          - wrapcheck
        path: _test\.go
      - linters:
          - mnd
          - wrapcheck
        path: ^tests/framework/
      - linters:
          - wrapcheck
        path: ^pkg/resolver/
      - linters:
          - varnamelen
        path: ^tests/.*
        text: (variable|parameter) name 'f' is too short for the scope of its usage
      - linters:
          - revive
        path: internal/version/version\.go
        text: var-naming.*avoid package names that conflict with Go standard library
      # Exclude SSRF check in test framework; ports are dynamically allocated but always bound to 127.0.0.1; static analysis cannot verify this.
      - linters:
          - gosec
        path: ^tests/framework/
        text: "G704:"
    paths:
      - pkg/apis/resourcestatemetrics/register.go
      - pkg/apis/resourcestatemetrics/v1alpha1/register.go
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gci
    - goimports
  exclusions:
    generated: lax
    paths:
      - pkg/apis/resourcestatemetrics/register.go
      - pkg/apis/resourcestatemetrics/v1alpha1/register.go
      - third_party$
      - builtin$
      - examples$
