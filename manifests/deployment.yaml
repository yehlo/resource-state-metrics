---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: exporter
    app.kubernetes.io/name: resource-state-metrics
    app.kubernetes.io/version: 0.0.1
  name: resource-state-metrics
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: resource-state-metrics
  template:
    metadata:
      labels:
        app.kubernetes.io/component: exporter
        app.kubernetes.io/name: resource-state-metrics
        app.kubernetes.io/version: 0.0.1
    spec:
      automountServiceAccountToken: true
      containers:
      - args:
        - --main-host=0.0.0.0
        - --main-port=9999
        - --self-host=0.0.0.0
        - --self-port=9998
        image: registry.k8s.io/resource-state-metrics/resource-state-metrics:v0.0.1
        livenessProbe:
          httpGet:
            path: /livez
            port: http-metrics
          initialDelaySeconds: 5
          timeoutSeconds: 5
        name: resource-state-metrics
        ports:
        - containerPort: 9999
          name: http-metrics
        - containerPort: 9998
          name: telemetry
        readinessProbe:
          httpGet:
            path: /readyz
            port: telemetry
          initialDelaySeconds: 5
          timeoutSeconds: 5
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65534
          seccompProfile:
            type: RuntimeDefault
      nodeSelector:
        kubernetes.io/os: linux
      serviceAccountName: resource-state-metrics
