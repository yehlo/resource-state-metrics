name: resourcemetricsmonitor-cardinality-cel
description: >
  Test cardinality tracking with CEL resolver. This verifies that cardinality
  counting works correctly when using CEL expressions for label resolution.
  A high cardinalityLimit ensures all metrics are generated.
in:
  apiVersion: resource-state-metrics.instrumentation.k8s-sigs.io/v1alpha1
  kind: ResourceMetricsMonitor
  metadata:
    name: resourcemetricsmonitor-cardinality-cel
    namespace: default
  spec:
    configuration:
      stores:
        - group: "samplecontroller.k8s.io"
          version: "v1beta1"
          kind: "Bar"
          resource: "bars"
          resolver: cel
          cardinalityLimit: 2
          families:
            - name: "cardinality_cel_test"
              help: "CEL cardinality test"
              cardinalityLimit: 2
              metrics:
                - labels:
                    - name: "language"
                      value: "o.spec.language"
                  value: "1"
metrics:
  - '# HELP kube_customresource_cardinality_cel_test CEL cardinality test'
  - '# TYPE kube_customresource_cardinality_cel_test gauge'
  - 'kube_customresource_cardinality_cel_test{language="csharp",group="samplecontroller.k8s.io",version="v1beta1",kind="Bar",name="test-sample",namespace="default"} 1.000000'
  - 'kube_customresource_cardinality_cel_test{language="csharp",group="samplecontroller.k8s.io",version="v1beta1",kind="Bar",name="test-sample-secondary",namespace="default"} 1.000000'
status:
  cardinality:
    total: 2
    thresholdsExceeded: false
  conditions:
    - type: Processed
      status: "True"
      reason: EventHandlerSucceeded
    - type: CardinalityCutoff
      status: "False"
      reason: CardinalityWarning
    - type: CardinalityWarning
      status: "True"
      reason: CardinalityWarning
