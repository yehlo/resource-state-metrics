---
name: resourcemetricsmonitor-todo
description: >
  Sanity test to ensure metrics are generated for multiple RMMs.
in:
  apiVersion: resource-state-metrics.instrumentation.k8s-sigs.io/v1alpha1
  kind: ResourceMetricsMonitor
  metadata:
    name: resourcemetricsmonitor-todo
    namespace: default
  spec:
    configuration: |
      generators:
        - group: "samplecontroller.k8s.io"
          version: "v1beta1"
          kind: "Bar"
          resource: "bars"
          families:
            - name: "bars_information"
              help: "Information about each Bar instance"
              metrics:
                - labels:
                    - name: "name"
                      value: "metadata.name"
                  value: "metadata.labels.bar"
                - labels:
                    - name: "name"
                      value: "metadata.name"
                    - name: "environmentType"
                      value: "spec.environmentType"
                    - name: "language"
                      value: "spec.language"
                  value: "metadata.labels.foo"

metrics:
  - '# HELP kube_customresource_bars_information Information about each Bar instance'
  - '# TYPE kube_customresource_bars_information gauge'
  - 'kube_customresource_bars_information{name="test-sample",group="samplecontroller.k8s.io",version="v1beta1",kind="Bar"} 2.000000'
  - 'kube_customresource_bars_information{name="test-sample-secondary",group="samplecontroller.k8s.io",version="v1beta1",kind="Bar"} 0.000000'
  - 'kube_customresource_bars_information{environment_type="dev",language="csharp",name="test-sample",group="samplecontroller.k8s.io",version="v1beta1",kind="Bar"} 1.000000'
  - 'kube_customresource_bars_information{environment_type="dev",language="csharp",name="test-sample-secondary",group="samplecontroller.k8s.io",version="v1beta1",kind="Bar"} 0.000000'
status:
  cardinality:
    total: 4
    thresholdsExceeded: false
  conditions:
    - type: Processed
      status: "True"
      reason: EventHandlerSucceeded
    - type: CardinalityCutoff
      status: "False"
      reason: CardinalityOK
    - type: CardinalityWarning
      status: "False"
      reason: CardinalityOK
