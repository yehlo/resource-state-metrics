name: resourcemetricsmonitor-cardinality-family-cutoff
description: >
  Test family-level cardinality cutoff. This RMM has a family with a
  cardinalityLimit of 1, meaning only 1 sample should be generated before
  the family is cut off. Since the first object processed generates 1 sample,
  subsequent objects should not generate metrics for this family.

  Note that upon cutoff, families are dropped entirely, so the metric with unit
  cardinality below will not show any metrics, for any object.
in:
  apiVersion: resource-state-metrics.instrumentation.k8s-sigs.io/v1alpha1
  kind: ResourceMetricsMonitor
  metadata:
    name: resourcemetricsmonitor-cardinality-family-cutoff
    namespace: default
  spec:
    configuration:
      stores:
        - group: "samplecontroller.k8s.io"
          version: "v1beta1"
          kind: "Bar"
          resource: "bars"
          resolver: unstructured
          families:
            - name: "cardinality_family_cutoff_test"
              help: "Family cutoff test; limit 1"
              cardinalityLimit: 1
              metrics:
                - labels: [] # this is a metric with only injected labelsets (objectKeys and GVK)
                  value: "1"
            - name: "cardinality_no_limit_family"
              help: "No limit family; should generate all metrics"
              metrics:
                - labels: [] # this is a metric with only injected labelsets (objectKeys and GVK)
                  value: "1"
metrics:
  - '# HELP kube_customresource_cardinality_no_limit_family No limit family; should generate all metrics'
  - '# TYPE kube_customresource_cardinality_no_limit_family gauge'
  - 'kube_customresource_cardinality_no_limit_family{group="samplecontroller.k8s.io",version="v1beta1",kind="Bar",name="test-sample",namespace="default"} 1.000000'
  - 'kube_customresource_cardinality_no_limit_family{group="samplecontroller.k8s.io",version="v1beta1",kind="Bar",name="test-sample-secondary",namespace="default"} 1.000000'
status:
  cardinality:
    total: 4
    thresholdsExceeded: true
  conditions:
    - type: Processed
      status: "True"
      reason: EventHandlerSucceeded
    - type: CardinalityCutoff
      status: "True"
      reason: CardinalityCutoff
    - type: CardinalityWarning
      status: "True"
      reason: CardinalityWarning
