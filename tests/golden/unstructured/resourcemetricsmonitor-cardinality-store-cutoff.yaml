name: resourcemetricsmonitor-cardinality-store-cutoff
description: >
  Test store-level cardinality cutoff. This RMM has a generator with
  cardinalityLimit of 2, meaning only 2 total samples across all families
  should be generated before the entire store is cut off.
in:
  apiVersion: resource-state-metrics.instrumentation.k8s-sigs.io/v1alpha1
  kind: ResourceMetricsMonitor
  metadata:
    name: resourcemetricsmonitor-cardinality-store-cutoff
    namespace: default
  spec:
    configuration:
      stores:
        - group: "samplecontroller.k8s.io"
          version: "v1beta1"
          kind: "Bar"
          resource: "bars"
          resolver: unstructured
          cardinalityLimit: 1
          families:
            - name: "cardinality_store_cutoff_test"
              help: "Store cutoff test - store limit 2"
              metrics:
                - labels: []
                  value: "1"
metrics:
  - '# HELP kube_customresource_cardinality_store_cutoff_test Store cutoff test - store limit 2'
  - '# TYPE kube_customresource_cardinality_store_cutoff_test gauge'
  - 'kube_customresource_cardinality_store_cutoff_test{group="samplecontroller.k8s.io",version="v1beta1",kind="Bar",name="test-sample",namespace="default"} 1.000000'
  - 'kube_customresource_cardinality_store_cutoff_test{group="samplecontroller.k8s.io",version="v1beta1",kind="Bar",name="test-sample-secondary",namespace="default"} 1.000000'
status:
  cardinality:
    total: 2
    thresholdsExceeded: true
  conditions:
    - type: Processed
      status: "True"
      reason: EventHandlerSucceeded
    - type: CardinalityCutoff
      status: "True"
      reason: CardinalityCutoff
    - type: CardinalityWarning
      status: "True"
      reason: CardinalityWarning
