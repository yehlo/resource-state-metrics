apiVersion: samplecontroller.k8s.io/v1beta1
kind: Bar
metadata:
  name: test-sample
  namespace: default
  labels:
    foo: "1"
    bar: "2"
  annotations:
    job: "resource-state-metrics"
    id: "1000"
spec:
  appId: test-sample
  language: csharp
  os: linux
  instanceSize: small
  environmentType: dev
  replicas: 3
  tags:
    - frontend
    - middleware
    - backend
  features:
    - monitoring
    - alerting
  versions:
    - "1.0"
    - "2.0"
    - "3.0"
    - "4.0"
  conditions:
    - type: Degraded
      status: "False"
      reason: Working
    - type: Progressing
      status: "Unknown"
      reason: Reconciling
    - type: Ready
      status: "True"
      reason: Ready
  xProps:
    nonComposite: "example-value"
    compositeArray:
      - "value1"
      - "value2"
    compositeMap:
      key1: "value1"
      key2: "value2"
