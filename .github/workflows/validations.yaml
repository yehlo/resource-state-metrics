name: validations
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
env:
  GO_VERSION: 1.25
jobs:
  vet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the codebase
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Vet the codebase
        run: go vet ./...
  verify_generated:
    needs: vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the codebase
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Setup dependencies
        run: make setup
      - name: Verify generated assets
        run: make verify_generated
  lint:
    needs: verify_generated
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the codebase
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Setup dependencies
        run: make setup
      - name: Run linter
        run: make lint
      - name: Lint commit (gitlint)
        run: |
          pre-commit run gitlint-ci --hook-stage manual --from-ref origin/${{ github.base_ref }} --to-ref HEAD
      - name: Lint commit (conventional)
        run: |
          MERGE_BASE=$(git merge-base origin/${{ github.base_ref }} HEAD)
          COMMITS=$(git rev-list $MERGE_BASE..HEAD)
          for commit in $COMMITS; do
            echo "Checking commit: $commit"
            git log -1 --pretty=%B $commit > /tmp/commit-msg
            pre-commit run conventional-pre-commit --hook-stage commit-msg --commit-msg-filename /tmp/commit-msg
          done
  test-unit:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the codebase
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Setup dependencies
        run: make setup
      - name: Run unit tests
        run: make test_unit
  test-e2e:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the codebase
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Setup dependencies
        run: make setup
      - name: Run e2e tests
        run: make test_e2e
  compare-metrics:
    needs: [test-unit, test-e2e]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the codebase
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Setup dependencies
        run: make setup
      - name: Create kind cluster
        uses: helm/kind-action@v1.14.0
        with:
          cluster_name: kind
      - name: Start controller
        env:
          KUBECONFIG: /home/runner/.kube/config
        run: |
          kind export kubeconfig
          nohup bash -c 'V=10 CREATED_AT_EPOCH=0 make local' &>/tmp/controller.log &
      - name: Wait for the build to complete
        run: sleep 60
      - name: Apply testdata
        run: make apply_testdata
      - name: Wait for metrics
        run: sleep 10
      - name: Compare metrics
        run: make compare_metrics
      - name: Print controller logs
        if: always()
        run: cat /tmp/controller.log || echo "(no controller logs found)"
